services:
  postgres:
    image: postgres:16-alpine
    container_name: skillmatch_postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: skillmatch
      POSTGRES_PASSWORD: skillmatch
      POSTGRES_DB: skillmatch_db
    ports:
      - '5433:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U skillmatch -d skillmatch_db']
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
